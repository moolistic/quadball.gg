<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile – Quadball League</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#C8A84B;--bg:#0A0A0F;--bg2:#111118;--bg3:#18181F;
  --card:#16161E;--text:#E8E8F0;--muted:#6B6B80;
  --border:rgba(255,255,255,0.07);--danger:#E24B4B;--success:#3DBF7A;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--rad:10px
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:54px;position:sticky;top:0;z-index:100}
.brand{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--accent);letter-spacing:2px;margin-right:14px;text-decoration:none}
.brand span{color:#fff}
.nb{background:none;border:none;color:rgba(255,255,255,0.5);font-family:var(--fb);font-size:13px;font-weight:600;padding:8px 12px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center}
.nb:hover{background:rgba(255,255,255,0.06);color:#fff}
.wrap{padding:28px 20px;max-width:560px;margin:0 auto}
.pt{font-family:var(--fd);font-size:38px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.ps{color:var(--muted);font-size:13px;font-weight:500;margin-bottom:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--rad);padding:28px;margin-bottom:16px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:16px}
input[type=text],input[type=email],input[type=password]{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--fb);font-size:14px;color:var(--text);background:var(--bg3);outline:none;transition:border-color .15s}
input:focus{border-color:var(--accent)}
.btn{width:100%;padding:13px;border:none;border-radius:8px;font-family:var(--fd);font-size:20px;font-weight:800;letter-spacing:1.5px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#E0C060}
.btn-secondary{background:none;border:1px solid var(--border);color:var(--muted);font-size:15px;letter-spacing:.5px}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:none;border:1px solid var(--danger);color:var(--danger);font-size:15px;letter-spacing:.5px}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-google{background:#fff;color:#222;border:none;border-radius:8px;width:100%;padding:12px;font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;transition:all .15s}
.btn-google:hover{background:#f0f0f0}
.btn-google svg{flex-shrink:0}
.tab-row{display:flex;gap:4px;margin-bottom:20px}
.tab{flex:1;padding:9px;border:1px solid var(--border);border-radius:8px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;background:none;color:var(--muted);transition:all .15s;text-align:center}
.tab.active{background:rgba(200,168,75,0.1);border-color:var(--accent);color:var(--accent)}
.av-lg{width:72px;height:72px;border-radius:50%;background:rgba(200,168,75,0.1);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:28px;font-weight:800;color:var(--accent);margin:0 auto 16px}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
/* Multi-select team chips */
.team-select-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;min-height:48px;cursor:pointer;transition:border-color .15s}
.team-select-wrap:focus-within,.team-select-wrap.open{border-color:var(--accent)}
.team-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.chip{background:rgba(200,168,75,0.15);border:1px solid rgba(200,168,75,0.3);border-radius:20px;padding:3px 10px 3px 12px;font-size:13px;color:var(--accent);display:flex;align-items:center;gap:6px}
.chip-x{cursor:pointer;opacity:.6;font-size:16px;line-height:1}
.chip-x:hover{opacity:1}
.team-dropdown{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-top:6px;overflow:hidden;display:none;max-height:200px;overflow-y:auto}
.team-dropdown.open{display:block}
.team-opt{padding:10px 14px;font-size:14px;cursor:pointer;transition:background .1s}
.team-opt:hover{background:rgba(255,255,255,0.05)}
.team-opt.selected{color:var(--accent)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--success);color:#fff;padding:14px 22px;border-radius:10px;font-weight:700;font-size:14px;transform:translateY(80px);opacity:0;transition:all .3s ease;z-index:9999;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:var(--danger)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
#auth-loading{text-align:center;padding:60px 20px;color:var(--muted)}
@media(max-width:500px){.fr{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <a class="brand" href="index.html">QB<span>L</span></a>
  <a class="nb" href="index.html" style="text-decoration:none">← Back to League</a>
</nav>

<div class="wrap">
  <div id="auth-loading" style="text-align:center;padding:60px 20px;color:var(--muted)">
    <div style="display:inline-block;width:32px;height:32px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite"></div>
  </div>

  <!-- SIGNED OUT: Login / Register -->
  <div id="auth-panel" style="display:none">
    <div class="pt">My Profile</div>
    <div class="ps">Sign in to track your team's history</div>

    <!-- Google Sign In (top) -->
    <button class="btn-google" onclick="signInGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or use email</div>

    <div class="tab-row">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- SIGN IN -->
    <div id="panel-signin" class="card">
      <div class="fg"><label>Email</label><input type="email" id="si-email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="fg"><label>Password</label><input type="password" id="si-pass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()"></div>
      <button class="btn btn-primary" onclick="signIn()">SIGN IN</button>
      <button class="btn btn-secondary" onclick="resetPassword()">Forgot Password?</button>
    </div>

    <!-- REGISTER -->
    <div id="panel-register" class="card" style="display:none">
      <div class="fg"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="fg"><label>Password (min 6 chars)</label><input type="password" id="reg-pass" placeholder="Password" autocomplete="new-password"></div>
      <div class="fg"><label>Confirm Password</label><input type="password" id="reg-pass2" placeholder="Confirm password" onkeydown="if(event.key==='Enter')register()"></div>
      <button class="btn btn-primary" onclick="register()">CREATE ACCOUNT</button>
    </div>
  </div>

  <!-- SIGNED IN: Profile -->
  <div id="profile-panel" style="display:none">
    <div class="pt">My Profile</div>
    <div class="ps" id="profile-sub">Manage your account</div>

    <div class="card" style="text-align:center">
      <div class="av-lg" id="profile-av">?</div>
      <div style="font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:1px;text-transform:uppercase" id="profile-name">—</div>
      <div style="font-size:13px;color:var(--muted);margin-top:4px" id="profile-email">—</div>
    </div>

    <div class="card">
      <div style="font-family:var(--fd);font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;color:var(--accent)">Edit Profile</div>
      <div class="fr">
        <div class="fg"><label>First Name</label><input type="text" id="edit-first" placeholder="First"></div>
        <div class="fg"><label>Last Name</label><input type="text" id="edit-last" placeholder="Last"></div>
      </div>
      <div class="fg">
        <label>Followed Teams</label>
        <div class="team-select-wrap" id="team-select-wrap">
          <div class="team-chips" id="team-chips"></div>
          <div style="font-size:13px;color:var(--muted);cursor:pointer" onclick="toggleTeamDropdown()">Click to select teams…</div>
        </div>
        <div class="team-dropdown" id="team-dropdown"></div>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">SAVE CHANGES</button>
    </div>

    <div class="card">
      <button class="btn btn-danger" onclick="signOut()">SIGN OUT</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, setDoc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword,
         createUserWithEmailAndPassword, sendPasswordResetEmail,
         signOut as fbSignOut, updateProfile,
         GoogleAuthProvider, signInWithPopup }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCSYAz6tnIOxG9MMkOUoDtMSRMFdkpT6KQ",
  authDomain: "quadball-1596e.firebaseapp.com",
  projectId: "quadball-1596e",
  storageBucket: "quadball-1596e.firebasestorage.app",
  messagingSenderId: "385141631326",
  appId: "1:385141631326:web:cf0ba334d8af6027de47cf",
  measurementId: "G-SJ8E8BB1TS"
};

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);
const gProvider = new GoogleAuthProvider();

function initials(n){ return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function toast(msg,err){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(err?' err':'')+' show';
  setTimeout(()=>t.className='toast',5000);
}

let currentUser=null, userProfile=null, allTeams=[], selectedTeams=new Set();

// ── Team multi-select ─────────────────────────────────────────────────────────
async function loadTeams(){
  try{
    const snap=await getDocs(collection(db,'teams'));
    allTeams=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));
    renderTeamDropdown();
  } catch(e){ console.warn('Could not load teams',e); }
}

function renderTeamDropdown(){
  const dd=document.getElementById('team-dropdown');
  dd.innerHTML=allTeams.map(t=>`
    <div class="team-opt${selectedTeams.has(t.id)?' selected':''}" onclick="toggleTeam('${t.id}','${t.name.replace(/'/g,"\\'")}')">
      ${selectedTeams.has(t.id)?'✓ ':''}${t.name}
    </div>`).join('');
}

function renderTeamChips(){
  const chips=document.getElementById('team-chips');
  chips.innerHTML=[...selectedTeams].map(id=>{
    const t=allTeams.find(x=>x.id===id); if(!t) return '';
    return `<span class="chip">${t.name}<span class="chip-x" onclick="toggleTeam('${t.id}','')">×</span></span>`;
  }).join('');
}

window.toggleTeam=function(id,name){
  if(selectedTeams.has(id)) selectedTeams.delete(id);
  else selectedTeams.add(id);
  renderTeamChips();
  renderTeamDropdown();
};

window.toggleTeamDropdown=function(){
  document.getElementById('team-dropdown').classList.toggle('open');
};

// Close dropdown on outside click
document.addEventListener('click',e=>{
  if(!document.getElementById('team-select-wrap').contains(e.target)&&
     !document.getElementById('team-dropdown').contains(e.target)){
    document.getElementById('team-dropdown').classList.remove('open');
  }
});

// ── Auth ──────────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user=>{
  document.getElementById('auth-loading').style.display='none';
  currentUser=user;
  if(user){
    try{
      const snap=await getDoc(doc(db,'users',user.uid));
      userProfile=snap.exists()?snap.data():null;
    } catch(e){ userProfile=null; }
    await loadTeams();
    showProfile(user);
  } else {
    document.getElementById('auth-panel').style.display='';
    document.getElementById('profile-panel').style.display='none';
    loadTeams(); // still load for display
  }
});

function showProfile(user){
  document.getElementById('auth-panel').style.display='none';
  document.getElementById('profile-panel').style.display='';
  const firstName=userProfile?.firstName||'';
  const lastName=userProfile?.lastName||'';
  const displayName=firstName&&lastName?`${firstName} ${lastName}`:(firstName||lastName||user.displayName||user.email.split('@')[0]);
  document.getElementById('profile-av').textContent=initials(displayName);
  document.getElementById('profile-name').textContent=displayName;
  document.getElementById('profile-email').textContent=user.email;
  document.getElementById('edit-first').value=firstName;
  document.getElementById('edit-last').value=lastName;

  // Restore followed teams
  selectedTeams=new Set(userProfile?.followedTeams||[]);
  renderTeamChips();
  renderTeamDropdown();
}

window.switchTab=function(tab){
  document.getElementById('tab-signin').classList.toggle('active',tab==='signin');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('panel-signin').style.display=tab==='signin'?'':'none';
  document.getElementById('panel-register').style.display=tab==='register'?'':'none';
};

window.signInGoogle=async function(){
  try{ await signInWithPopup(auth,gProvider); toast('Signed in!'); }
  catch(e){ toast(e.message,true); }
};

window.signIn=async function(){
  const email=document.getElementById('si-email').value.trim();
  const pass=document.getElementById('si-pass').value;
  if(!email||!pass){ toast('Email and password required',true); return; }
  try{ await signInWithEmailAndPassword(auth,email,pass); toast('Signed in!'); }
  catch(e){ toast(e.message,true); }
};

window.register=async function(){
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  if(!email||!pass){ toast('All fields required',true); return; }
  if(pass!==pass2){ toast('Passwords do not match',true); return; }
  if(pass.length<6){ toast('Password must be at least 6 characters',true); return; }
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'users',cred.user.uid),{email,firstName:'',lastName:'',followedTeams:[],createdAt:Date.now()});
    toast('Account created!');
  } catch(e){ toast(e.message,true); }
};

window.saveProfile=async function(){
  if(!currentUser) return;
  const firstName=document.getElementById('edit-first').value.trim();
  const lastName=document.getElementById('edit-last').value.trim();
  const followedTeams=[...selectedTeams];
  const displayName=[firstName,lastName].filter(Boolean).join(' ');
  try{
    const ref=doc(db,'users',currentUser.uid);
    const snap=await getDoc(ref);
    if(snap.exists()) await updateDoc(ref,{firstName,lastName,followedTeams});
    else await setDoc(ref,{email:currentUser.email,firstName,lastName,followedTeams,createdAt:Date.now()});
    if(displayName) await updateProfile(currentUser,{displayName});
    userProfile={...userProfile,firstName,lastName,followedTeams};
    showProfile(currentUser);
    toast('Profile saved!');
  } catch(e){ toast(e.message,true); }
};

window.resetPassword=async function(){
  const email=document.getElementById('si-email').value.trim();
  if(!email){ toast('Enter your email first',true); return; }
  try{ await sendPasswordResetEmail(auth,email); toast('Reset email sent!'); }
  catch(e){ toast(e.message,true); }
};

window.signOut=async function(){
  try{ await fbSignOut(auth); toast('Signed out'); }
  catch(e){ toast(e.message,true); }
};
</script>
</body>
</html>
